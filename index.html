<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe | Portal</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.4/+esm"></script>
</head>
<body class="bg-black text-white h-screen w-full overflow-hidden flex items-center justify-center selection:bg-purple-500/30">

    <audio id="bg-music" data-turbo-permanent="true" loop pre-load="auto">
    <source src="assets/hk.mp3" type="audio/mpeg">
    <source src="assets/ana.mp3" type="audio/mpeg">
    <source src="assets/tnye.mp3" type="audio/mpeg">
</audio>

    <!-- VFX: Background Aurora -->
    <div class="aurora-bg"></div>
    <div class="aurora-overlay"></div>

    <!-- Language Toggle -->
    <div class="fixed top-6 right-6 z-[100]">
        <button id="lang-toggle" class="glass-card px-4 py-2 rounded-full border border-white/10 text-[10px] font-bold tracking-widest uppercase flex items-center gap-2 hover:bg-white/5 transition-all active:scale-95">
            <i data-lucide="languages" class="w-3 h-3"></i>
            <span id="lang-text">EN</span>
        </button>
    </div>

    <main class="relative z-20 w-full max-w-md px-6">
        
        <!-- SCENE 1: CINEMATIC INTRO -->
        <div id="scene-intro" class="flex flex-col items-center justify-center h-full">
            <!-- The text will be scrambled by JS -->
            <h1 id="intro-text" class="text-8xl font-bold font-space tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-white/50" data-value="VIBE." data-i18n="portal_title">
                X#@%
            </h1>
            <div class="mt-4 flex items-center gap-2 text-xs font-mono text-gray-500 tracking-[0.2em] uppercase">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span data-i18n="system_status">System Online</span>
            </div>
        </div>

        <!-- SCENE 2: AUTH CARD -->
        <div id="scene-auth" class="hidden opacity-0 scale-95 transition-all duration-1000 ease-out">
            
            <div class="glass-card relative p-8 rounded-[2rem] border border-white/5 backdrop-blur-2xl overflow-hidden">
                
                <!-- VFX: Shimmer Border -->
                <div class="shimmer-border"></div>

                <!-- HEADER & ADMIN TRIGGER (LONG PRESS HERE) -->
                <div id="logo-trigger" class="text-center mb-8 relative select-none cursor-grab active:cursor-grabbing group">
                    <!-- Progress Ring for Admin Unlock -->
                    <svg class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-24 h-24 -rotate-90 pointer-events-none opacity-0 transition-opacity duration-300" id="admin-progress">
                        <circle cx="48" cy="48" r="46" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none"/>
                        <circle cx="48" cy="48" r="46" stroke="#10b981" stroke-width="2" fill="none" stroke-dasharray="289" stroke-dashoffset="289" id="progress-ring" class="transition-all duration-[2000ms] ease-linear"/>
                    </svg>

                    <h2 class="text-4xl font-bold font-space tracking-tight text-white group-hover:text-purple-200 transition-colors" data-i18n="card_header">Vibe.</h2>
                    <p class="text-gray-400 text-xs mt-2 font-mono" id="status-text" data-i18n="unlock_status">HOLD TO UNLOCK SYSTEM</p>
                </div>

                <!-- FORM -->
                <form id="auth-form" class="space-y-4 relative z-10">
                    
                    <div id="field-name" class="hidden input-group">
                        <input type="text" id="input-name" placeholder=" " class="peer">
                        <label data-i18n="field_username">Username</label>
                        <i data-lucide="user" class="icon"></i>
                    </div>

                    <div class="input-group">
                        <input type="email" id="input-email" placeholder=" " required class="peer">
                        <label data-i18n="field_email">Email Address</label>
                        <i data-lucide="mail" class="icon"></i>
                    </div>

                    <div class="input-group">
                        <input type="password" id="input-password" placeholder=" " required class="peer">
                        <label data-i18n="field_password">Password</label>
                        <i data-lucide="lock" class="icon"></i>
                    </div>

                    <!-- HIDDEN ADMIN FIELD (Slides down) -->
                    <div id="admin-panel" class="h-0 overflow-hidden transition-all duration-500">
                        <div class="bg-green-900/10 border border-green-500/30 rounded-xl p-1 mt-2">
                            <input type="text" id="input-admin-code" placeholder="ENTER ROOT KEY..." data-i18n="field_admin_placeholder" class="w-full bg-transparent text-green-400 placeholder-green-700 text-center font-mono text-sm py-2 focus:outline-none tracking-widest uppercase">
                        </div>
                    </div>

                    <button type="submit" id="btn-submit" class="w-full h-12 bg-white text-black font-bold rounded-xl mt-4 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2 relative overflow-hidden group">
                        <div class="absolute inset-0 bg-gradient-to-r from-purple-500 to-blue-500 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                        <span class="relative z-10 group-hover:text-white transition-colors" id="btn-text" data-i18n="btn_connect">Connect</span>
                        <i data-lucide="arrow-right" class="w-4 h-4 relative z-10 group-hover:text-white group-hover:translate-x-1 transition-all"></i>
                    </button>
                </form>

                <!-- FOOTER -->
                <div class="mt-6 text-center">
                    <button id="btn-google" class="text-xs text-gray-400 hover:text-white flex items-center justify-center gap-2 mx-auto transition-colors border border-white/10 px-4 py-2 rounded-full hover:bg-white/5">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/></svg>
                        <span data-i18n="btn_google">Sign in with Google</span>
                    </button>
                    <p class="mt-4 text-xs text-gray-600">
                        <span id="toggle-text" data-i18n="toggle_text_login">First time?</span>
                        <button id="btn-toggle" class="text-white font-medium hover:underline ml-1" data-i18n="btn_toggle_signup">Create ID</button>
                    </p>
                </div>
            </div>
        </div>

        <!-- SCENE 3: OUTRO (Guest) -->
        <div id="scene-outro-guest" class="hidden absolute inset-0 flex flex-col items-center justify-center text-center">
            <div class="w-[300px] h-[300px] bg-purple-500/20 rounded-full blur-[100px] absolute"></div>
            <h2 class="text-6xl font-bold text-white relative z-10 animate-pulse" data-i18n="outro_guest">Welcome.</h2>
        </div>

        <!-- SCENE 4: OUTRO (Admin) -->
        <div id="scene-outro-admin" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black z-50">
            <div class="font-mono text-green-500 text-center">
                <div class="text-xs tracking-widest mb-4" data-i18n="outro_admin_text">SYSTEM OVERRIDE</div>
                <h2 class="text-5xl font-bold glitch-text" data-text="ACCESS GRANTED" data-i18n="outro_admin_title">ACCESS GRANTED</h2>
            </div>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="border-t border-white/10 bg-black/50 backdrop-blur-xl py-12 px-6 relative z-10 mt-20">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 bg-purple-600 rounded flex items-center justify-center font-bold text-[10px]">V</div>
                <span class="text-sm font-bold font-space tracking-tighter" data-i18n="card_header">Vibe.</span>
            </div>
            <p class="text-[10px] text-gray-500 font-mono uppercase tracking-widest" data-i18n="footer_copyright">© 2026 Vibe Ecosystem. All rights reserved.</p>
            <div class="flex items-center gap-4">
                <a href="#" class="text-gray-500 hover:text-white transition-colors"><i data-lucide="github" class="w-4 h-4"></i></a>
                <a href="#" class="text-gray-500 hover:text-white transition-colors"><i data-lucide="twitter" class="w-4 h-4"></i></a>
                <a href="#" class="text-gray-500 hover:text-white transition-colors"><i data-lucide="instagram" class="w-4 h-4"></i></a>
            </div>
        </div>
    </footer>

    <script type="module" src="script.js"></script>
    <script type="module" src="audio.js"></script>

</body>
</html>
